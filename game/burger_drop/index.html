<!DOCTYPE html>
<html>
<head>
  <title>BurgerDrop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #1a0a00;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    #gameCanvas {
      border: 10px solid black;
      background: url(assets/play_background.jpg) no-repeat center center;
      background-size: cover;
      z-index: 1;
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      backface-visibility: hidden;
      transform: translate3d(0,0,0);
      -webkit-backface-visibility: hidden;
      -webkit-transform: translate3d(0,0,0);
    }

    @media (max-width: 768px) {
      #gameCanvas { border: 5px solid black; }
    }

    /* ── PRELOADER OVERLAY ─────────────────────────── */
    #preloader {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      background: #1a0a00;
      transition: opacity 0.5s ease;
    }
    #preloader.hide {
      opacity: 0;
      pointer-events: none;
    }

    .pre-title {
      font-family: 'Arial Black', Arial, sans-serif;
      font-size: clamp(2rem, 10vw, 3.2rem);
      font-weight: 900;
      color: #FFD700;
      text-shadow: 4px 4px 0 #000, -1px -1px 0 #000;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .pre-burger {
      font-size: clamp(3rem, 15vw, 5rem);
      animation: bob 1s ease-in-out infinite;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .pre-bar-wrap {
      width: min(280px, 70vw);
      height: 14px;
      background: rgba(255,255,255,0.12);
      border-radius: 99px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.1);
    }
    .pre-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: linear-gradient(90deg, #f5a623, #FFD700);
      transition: width 0.15s ease;
    }

    .pre-label {
      font-family: 'Arial', sans-serif;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    #devModeButton {
      position: fixed; top: 10px; right: 10px;
      padding: 10px 15px;
      background-color: rgba(255,0,0,0.7);
      color: white; border: 2px solid white;
      border-radius: 5px; font-weight: bold;
      cursor: pointer; z-index: 1000;
      font-size: 14px; display: none;
    }
    #devModeButton.active { background-color: rgba(0,255,0,0.7); }
  </style>
</head>
<body>

  <!-- PRELOADER — hidden by JS once all assets ready -->
  <div id="preloader">
    <div class="pre-burger">🍔</div>
    <div class="pre-title">BURGER DROP</div>
    <div class="pre-bar-wrap">
      <div class="pre-bar-fill" id="preBarFill"></div>
    </div>
    <div class="pre-label" id="preLabel">Loading…</div>
  </div>

  <button id="devModeButton" onclick="toggleDevMode()">DEV MODE: OFF</button>
  <canvas id="gameCanvas" width="450" height="800"></canvas>
  <script src="assets/falling_game_mobile.js"></script>

</body>
</html>
