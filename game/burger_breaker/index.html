<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Burger Breaker — BHB Arcade</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 18%, rgba(0,240,255,0.16), rgba(16,27,45,0) 30%),
        radial-gradient(circle at 50% 72%, rgba(255,123,84,0.10), rgba(16,27,45,0) 36%),
        linear-gradient(180deg, #0c1424 0%, #080c14 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Caveat', cursive;
      -webkit-tap-highlight-color: transparent;
      /* Prevent the browser treating touches as scroll/zoom — canvas handles everything */
      touch-action: none;
      overscroll-behavior: none;
    }
    .game-shell {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(6px, env(safe-area-inset-top)) max(6px, env(safe-area-inset-right)) max(6px, env(safe-area-inset-bottom)) max(6px, env(safe-area-inset-left));
    }
    canvas {
      width: auto;
      height: min(98vh, calc(100vw * 1.444));
      max-width: min(100vw - 12px, 540px);
      background:
        radial-gradient(circle at 50% 25%, rgba(44,101,255,0.38), rgba(16,27,45,0) 34%),
        linear-gradient(180deg, #13213a 0%, #0d1728 100%);
      border-radius: 14px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 0 38px rgba(0,0,0,0.65), 0 0 80px rgba(0,240,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      touch-action: none;
      display: block;
      user-select: none;
    }

    /* ── PRELOADER ─────────────────────────────────────────────── */
    #preloader {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.4rem;
      background:
        radial-gradient(circle at 50% 25%, rgba(44,101,255,0.28), transparent 50%),
        linear-gradient(180deg, #0d1a2e 0%, #080c14 100%);
      transition: opacity 0.55s ease, visibility 0.55s ease;
      /* IMPORTANT: never block touch/pointer events — canvas must receive input */
      touch-action: none;
    }
    #preloader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .pre-logo {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.6rem, 6vw, 2.4rem);
      color: #d7f28b;
      letter-spacing: 0.06em;
      text-align: center;
      line-height: 1.1;
      text-shadow: 0 0 30px rgba(215,242,139,0.35);
    }
    .pre-logo span {
      display: block;
      font-size: 2.4em;
      line-height: 1;
      filter: drop-shadow(0 0 16px rgba(0,240,255,0.5));
    }

    /* Animated burger stack */
    .pre-burger {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .bun-top, .bun-bot {
      width: 54px; height: 14px;
      border-radius: 50px 50px 6px 6px;
      background: linear-gradient(180deg, #f5a623 0%, #e07b00 100%);
      box-shadow: 0 2px 8px rgba(240,130,0,0.5);
    }
    .bun-bot { border-radius: 6px 6px 50px 50px; }
    .patty {
      width: 52px; height: 10px;
      border-radius: 4px;
      background: linear-gradient(180deg, #7b3f00 0%, #5a2d00 100%);
    }
    .lettuce {
      width: 56px; height: 7px;
      border-radius: 10px;
      background: linear-gradient(90deg, #2ecc40, #27ae60, #2ecc40);
    }
    .cheese {
      width: 54px; height: 6px;
      border-radius: 3px;
      background: #f5d020;
    }

    /* Progress bar */
    .pre-bar-wrap {
      width: min(200px, 55vw);
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
    }
    .pre-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: linear-gradient(90deg, #00f0ff, #d7f28b);
      transition: width 0.2s ease;
      box-shadow: 0 0 8px rgba(0,240,255,0.6);
    }

    .pre-label {
      font-family: 'Caveat', cursive;
      font-size: 1rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* Bounce animation on the burger layers */
    @keyframes bounceLayer {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-4px); }
    }
    .bun-top  { animation: bounceLayer 1.1s ease-in-out infinite 0.0s; }
    .cheese   { animation: bounceLayer 1.1s ease-in-out infinite 0.1s; }
    .lettuce  { animation: bounceLayer 1.1s ease-in-out infinite 0.2s; }
    .patty    { animation: bounceLayer 1.1s ease-in-out infinite 0.3s; }
    .bun-bot  { animation: bounceLayer 1.1s ease-in-out infinite 0.4s; }
  </style>
</head>
<body>

  <!-- PRELOADER — shown until critical menu assets are ready -->
  <div id="preloader">
    <div class="pre-burger">
      <div class="bun-top"></div>
      <div class="cheese"></div>
      <div class="lettuce"></div>
      <div class="patty"></div>
      <div class="bun-bot"></div>
    </div>
    <div class="pre-logo">
      <span>🍔</span>
      BURGER BREAKER
    </div>
    <div class="pre-bar-wrap">
      <div class="pre-bar-fill" id="preBarFill"></div>
    </div>
    <div class="pre-label" id="preLabel">Loading…</div>
  </div>

  <div class="game-shell">
    <canvas id="game" width="540" height="780" aria-label="Burger Breaker game canvas"></canvas>
  </div>
  <script src="burger_breaker_v16.js"></script>

  <script>
    // The game's `const images` is not on window, so the game JS explicitly
    // sets window._bhbImages = images. We poll that here.

    const TOTAL_ASSETS = 53; // 3 core + 50 level images
    const bar          = document.getElementById('preBarFill');
    const label        = document.getElementById('preLabel');
    const overlay      = document.getElementById('preloader');

    let revealed  = false;
    let lastCount = 0;

    function countReady() {
      const imgs = window._bhbImages;
      if (!imgs) return 0;
      let n = 0;
      if (imgs.logoReady)     n++;
      if (imgs.titleBgReady)  n++;
      if (imgs.lavaDropReady) n++;
      for (let i = 1; i <= 25; i++) {
        const lvl = imgs.levels?.[i];
        if (lvl?.burgerReady) n++;
        if (lvl?.bgReady)     n++;
      }
      return n;
    }

    function criticalReady() {
      const imgs = window._bhbImages;
      return !!(imgs?.logoReady && imgs?.titleBgReady);
    }

    // Canvas pixel fallback: if _bhbImages somehow isn't available, check
    // whether the game has drawn anything to the canvas yet.
    function canvasIsRendering() {
      try {
        const c = document.getElementById('game');
        if (!c) return false;
        // Sample a few pixels in the center of the canvas (540×780 coords)
        const d = c.getContext('2d').getImageData(200, 300, 5, 1).data;
        for (let i = 3; i < d.length; i += 4) {
          if (d[i] > 0) return true; // any non-transparent pixel = game is drawing
        }
        return false;
      } catch(_) { return false; }
    }

    function reveal() {
      if (revealed) return;
      revealed = true;
      bar.style.width = '100%';
      setTimeout(() => overlay.classList.add('hidden'), 150);
    }

    function tick() {
      const n = countReady();

      if (n !== lastCount) {
        lastCount = n;
        const pct = Math.round((n / TOTAL_ASSETS) * 100);
        bar.style.width = pct + '%';
        label.textContent = n < 3 ? 'Loading…' : `Loading… ${pct}%`;
      }

      if (!revealed) {
        if (criticalReady() || canvasIsRendering()) {
          reveal();
          return;
        }
        requestAnimationFrame(tick);
      }
    }

    // Start polling after the game script has had a chance to run
    requestAnimationFrame(() => requestAnimationFrame(tick));

    // Hard fallback: always reveal after 5 seconds max
    setTimeout(() => reveal(), 5000);
  </script>
</body>
</html>
